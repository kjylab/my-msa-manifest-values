image:
  repository: kjylab/my-msa-product-service
  tag: 746c2a69129c21979e9ebd3158eaaa99d6083824
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9090

appConfig:
  spring:
    application:
      name: product-service
    datasource:
      url: jdbc:postgresql://postgresql.postgresql.svc.cluster.local:5432/product_db
      username: product-service
      password: product-service
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
