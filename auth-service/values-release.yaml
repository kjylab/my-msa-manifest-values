image:
  repository: 577201457903.dkr.ecr.ap-northeast-2.amazonaws.com/msa/auth-service
  tag: f42ea299a719d8e3f0734289cab7cd88e3441c00
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9090

serviceMonitor:
  enabled: true

ingress:
  enabled: false

appConfig:
  spring:
    application:
      name: auth-service
    datasource:
      url: jdbc:postgresql://auth-db-rw.postgresql.svc.cluster.local:5432/auth_db
      username: auth-service
      password: auth-service
      driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: false
    data:
      redis:
        host: redis-master.redis.svc.cluster.local
        port: 6379
        password: admin1234
  jwt:
    secret: v7S6A9yB2E5H8KcNfUjXnZr4u7x!A%D*G-
    access-token-expiry-seconds: 1800
    refresh-token-expiry-seconds: 604800
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
        exposure:
          include: health,prometheus
    endpoint:
      health:
        show-details: always
      prometheus:
        enabled: true
    tracing:
      sampling:
        probability: 1.0
    otlp:
      tracing:
        endpoint: http://tempo.monitoring.svc.cluster.local:4318/v1/traces
