image:
  repository: kanei0415/ktcloud-msa-inventory-service
  tag: 8264b84aaea6d3ba44dbee28ca799885aafc9659
  pullPolicy: IfNotPresent

service:
  type: ClusterIP

appConfig:
  spring:
    application:
      name: inventory-service
    datasource:
      url: jdbc:postgresql://localhost:7004/inventory_db
      username: inventory-service
      password: inventory-service
      driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: create
      generate-ddl: true
      show-sql: true
    data:
      redis:
        host: localhost
        port: 7005
        password: inventory-service
    kafka:
      bootstrap-servers: localhost:7003
      consumer:
        group-id: inventory-service-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topic:
        inventory-reserved-result: inventory-reserved-result-topic
        inventory-reserve-request: inventory-reserve-request-topic
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always