image:
  repository: jyupk/my-msa-inventory-service
  tag: 75aaeaee0aedbda5743705f5f9604b50ce9022cb
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9090

serviceMonitor:
  enabled: true

ingress:
  enabled: false

envFrom:
  - secretRef:
      name: inventory-service-secret

appConfig:
  spring:
    application:
      name: inventory-service
    datasource:
      url: jdbc:postgresql://inventory-db-rw.postgresql.svc.cluster.local:5432/inventory_db
      username: inventory-service
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    jpa:
      database-platform: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
        ddl-auto: update
      generate-ddl: true
      show-sql: true
    data:
      redis:
        host: redis-master.redis.svc.cluster.local
        port: 6379
        password: ${REDIS_PASSWORD}
    kafka:
      bootstrap-servers: kafka.kafka.svc.cluster.local:9092
      consumer:
        group-id: inventory-service-group
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          spring.json.use.type.headers: false
          spring.json.trusted.packages: "*"
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      topic:
        inventory-reserved-result: inventory-reserved-result-topic
        inventory-reserve-request: inventory-reserve-request-topic
  server:
    port: 8080
  grpc:
    server:
      port: 9090
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
        exposure:
          include: health,prometheus
    endpoint:
      health:
        show-details: always
      prometheus:
        enabled: true
    tracing:
      sampling:
        probability: 1.0
    otlp:
      tracing:
        endpoint: http://tempo.monitoring.svc.cluster.local:4318/v1/traces
