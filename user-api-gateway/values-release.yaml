image:
  repository: kanei0415/ktcloud-msa-user-api-gateway
  tag: de9347d444cf0b00856ee3a7d9fa0840dba2ba3d
  pullPolicy: IfNotPresent

addons:
  

service:
  type: LoadBalancer

appConfig:
  spring:
    application:
      name: user-api-gateway
  grpc:
    client:
      product-service:
        address: 'static://product-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      order-service:
        address: 'static://order-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      inventory-service:
        address: 'static://inventory-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
  jwt:
    secret: '${JWT_SECRET_ENV}'
  server:
    port: 8080
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      groups-order: DESC
      operations-sorter: alpha
    api-docs:
      path: /v3/api-docs