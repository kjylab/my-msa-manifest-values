image:
  repository: kjylab/my-msa-user-api-gateway
  tag: 5a3884eb714cee8800b33f10d0ff37972861e7b3
  pullPolicy: IfNotPresent

addons:

service:
  type: ClusterIP 
  port: 8080

ingress:
  enabled: true
  className: traefik
  annotations:
    "service.beta.kubernetes.io/aws-load-balancer-type": "nlb"
    "service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled": "true"
    "service.beta.kubernetes.io/aws-load-balancer-scheme": "internet-facing"
  paths:
    - path: /
      pathType: Prefix
      

appConfig:
  spring:
    application:
      name: user-api-gateway
  grpc:
    client:
      product-service:
        address: 'static://product-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      order-service:
        address: 'static://order-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
      inventory-service:
        address: 'static://inventory-service-release.svc.ktcloud-market-msa-release:9090'
        negotiation-type: plaintext
  jwt:
    secret: 'v7S6A9yB2E5H8KcNfUjXnZr4u7x!A%D*G-'
  server:
    port: 8080
  management:
    endpoints:
      web:
        base-path: /
        path-mapping:
          health: healthz
    endpoint:
      health:
        show-details: always
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      groups-order: DESC
      operations-sorter: alpha
    api-docs:
      path: /v3/api-docs
